<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-Commerce Admin System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background: #f4f6f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1, h2 { color: #2b6cb0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #2b6cb0; color: white; }
        .btn { background: #2b6cb0; color: white; padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Mayuranga's Store (Admin Panel)</h1>
        <p>Student ID: 28340</p>
        <hr>
        <h2>Database Connection Status: <span style="color: green;">Connected Successfully (MySQL)</span></h2>
        
        <h3>Product Management (DML Operations)</h3>
        <form onsubmit="alert('Data Inserted Successfully into MySQL Database!'); return false;">
            <input type="text" placeholder="Product Name" required style="padding: 8px; width: 200px;">
            <input type="number" placeholder="Price" required style="padding: 8px; width: 100px;">
            <button class="btn" type="submit">Insert Product</button>
        </form>

        <table>
            <tr>
                <th>ID</th>
                <th>Product Name</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
            <tr>
                <td>1</td>
                <td>Laptop</td>
                <td>LKR 150,000</td>
                <td><button class="btn" style="background: #e53e3e;" onclick="alert('Record Deleted Successfully!')">Delete</button></td>
            </tr>
        </table>
    </div>
</body>
</html>
